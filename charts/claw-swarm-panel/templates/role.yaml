apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "claw-swarm-panel.serviceAccountName" . }}-role
rules:
- apiGroups:
  - "apps"
  resources:
  - statefulsets
  verbs:
  - "*"
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "claw-swarm-panel.serviceAccountName" . }}-rolebinding
subjects:
- kind: ServiceAccount
  name: {{ include "claw-swarm-panel.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "claw-swarm-panel.serviceAccountName" . }}-role
  apiGroup: rbac.authorization.k8s.io
