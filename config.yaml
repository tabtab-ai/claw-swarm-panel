# ── API Server ────────────────────────────────────────────────────────────────
server:
  port: 8088
  data_dir: ".claw-swarm"

# ── Adapter backend ──────────────────────────────────────────────────────────
adapter:
  type: "k8s"
  k8s:
    # Path to kubeconfig file. Resolution order:
    #   1. This field (explicit path)
    #   2. KUBECONFIG env var or ~/.kube/config
    #   3. In-cluster config
    kubeconfig: ""
    # Kubernetes namespace to manage claw instances in.
    # Falls back to POD_NAMESPACE env var, then "default".
    namespace: ""

