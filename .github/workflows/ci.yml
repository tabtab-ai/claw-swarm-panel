name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main"]
    tags: ["v*"]
    paths-ignore:
      - "charts/**"

jobs:
  # ── Preflight: lint check on PRs (skip WIP/Draft) ───────────────────────────
  preflight:
    name: Preflight (lint)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      !startsWith(github.event.pull_request.title, 'wip:') &&
      !startsWith(github.event.pull_request.title, 'draft:')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: lint-fix and verify no diff
        run: |
          LOCALBIN=$(go env GOPATH)/bin make lint-fix
          git diff --exit-code -- .

  # ── Build & push image on push to main (not a tag) ──────────────────────────
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute build metadata
        id: meta
        run: |
          TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "v0.0.0")
          DATE=$(TZ=Asia/Shanghai date +'%Y%m%d')
          SHA=$(echo "${{ github.sha }}" | cut -c1-10)
          echo "repotag=${TAG}" >> $GITHUB_OUTPUT
          echo "image_tag=${TAG}-${DATE}-${SHA}" >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: "docker.io"
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/claw-swarm-panel:${{ steps.meta.outputs.image_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/claw-swarm-panel:${{ steps.meta.outputs.date }}
            ${{ secrets.DOCKERHUB_USERNAME }}/claw-swarm-panel:${{ steps.meta.outputs.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/claw-swarm-panel:latest
