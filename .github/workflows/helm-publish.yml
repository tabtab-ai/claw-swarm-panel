name: Helm Publish

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths:
      - "charts/**"

env:
  CHART_PATH: charts/claw-swarm-panel

jobs:
  helm-publish:
    name: Package & push Helm chart
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Get chart version
        id: chart_version
        run: |
          VERSION=$(grep '^version:' ${{ env.CHART_PATH }}/Chart.yaml | awk '{print $2}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Package Helm chart
        run: helm package ${{ env.CHART_PATH }}

      - name: Push Helm chart to OCI registry
        run: |
          helm push claw-swarm-panel-${{ steps.chart_version.outputs.version }}.tgz \
            oci://registry-1.docker.io/${{ secrets.DOCKERHUB_USERNAME }}/claw-swarm-panel-chart
